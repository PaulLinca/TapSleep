now <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TapSleep — Feature Graphic (1024×500)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #06080f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 20px;
  padding: 40px;
}

/* ── Canvas ─────────────────────────────────────────────────────────────── */
.feature {
  width: 1024px;
  height: 500px;
  background: #0a0d1a;
  position: relative;
  overflow: hidden;
  border-radius: 4px;
  flex-shrink: 0;
}

/* ── Stars ──────────────────────────────────────────────────────────────── */
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  pointer-events: none;
}

/* ── Background glows ───────────────────────────────────────────────────── */
.glow-left {
  position: absolute;
  width: 560px; height: 560px;
  left: -60px; top: -80px;
  background: radial-gradient(circle, rgba(155,143,196,0.16) 0%, transparent 65%);
  pointer-events: none;
}
.glow-right {
  position: absolute;
  width: 400px; height: 400px;
  right: 40px; bottom: -100px;
  background: radial-gradient(circle, rgba(107,125,179,0.10) 0%, transparent 65%);
  pointer-events: none;
}
/* Fade-out vignette on right edge so screenshots blend in */
.vignette-right {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 120px;
  background: linear-gradient(to right, transparent, #0a0d1a);
  pointer-events: none;
  z-index: 20;
}
/* Soft left edge separator fade */
.vignette-left {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 60px;
  background: linear-gradient(to right, #0a0d1a, transparent);
  pointer-events: none;
  z-index: 20;
}

/* ── Left branding panel ────────────────────────────────────────────────── */
.brand {
  position: absolute;
  left: 64px; top: 0; bottom: 0;
  width: 340px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  z-index: 10;
}

.app-icon {
  width: 76px; height: 76px;
  border-radius: 20px;
  margin-bottom: 22px;
  box-shadow: 0 8px 32px rgba(155,143,196,0.25);
}

.wordmark {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 70px;
  line-height: 1;
  letter-spacing: -1px;
  margin-bottom: 14px;
}
.wordmark .tap   { color: #e8e4d8; font-weight: 400; }
.wordmark .sleep { color: #c8c0a8; font-style: italic; font-weight: 300; }

.label {
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  font-weight: 300;
  letter-spacing: 0.22em;
  color: #6b7db3;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.tagline {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 23px;
  font-style: italic;
  font-weight: 300;
  color: rgba(200,192,168,0.60);
  line-height: 1.45;
}

/* Thin separator line */
.separator {
  position: absolute;
  left: 430px; top: 40px; bottom: 40px;
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(155,143,196,0.18) 30%, rgba(155,143,196,0.18) 70%, transparent);
  z-index: 5;
}

/* ── Screenshots ────────────────────────────────────────────────────────── */
.screenshots {
  position: absolute;
  left: 440px; right: 0;
  top: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 8;
}

.phone {
  position: absolute;
  border-radius: 26px;
  overflow: hidden;
  border: 1.5px solid rgba(155,143,196,0.22);
  box-shadow:
    0 32px 80px rgba(0,0,0,0.75),
    0 0 0 1px rgba(255,255,255,0.04);
}
.phone img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
}

/* Three phones: back-left, front-center, back-right */
.phone-1 {
  width: 154px; height: 324px;
  left: 28px;
  top: 50%; transform: translateY(-52%) rotate(-7deg);
  z-index: 1;
  opacity: 0.80;
}
.phone-2 {
  width: 172px; height: 362px;
  left: 154px;
  top: 50%; transform: translateY(-50%) rotate(-1deg);
  z-index: 3;
}
.phone-3 {
  width: 154px; height: 324px;
  left: 300px;
  top: 50%; transform: translateY(-48%) rotate(6deg);
  z-index: 1;
  opacity: 0.80;
}

/* ── Export hint ────────────────────────────────────────────────────────── */
.hint {
  color: rgba(107,125,179,0.5);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
}
</style>
</head>
<body>

<div class="feature" id="feature">
  <div class="glow-left"></div>
  <div class="glow-right"></div>

  <!-- Branding -->
  <div class="brand">
    <img class="app-icon" src="./app_icon-playstore.png" alt="TapSleep icon">
    <div class="wordmark">
      <span class="tap">Tap</span><span class="sleep">Sleep</span>
    </div>
    <div class="label">sleep sounds</div>
    <div class="tagline">9 ambient sounds.<br>Sleep on a timer.<br>Blend any mix.</div>
  </div>

  <div class="separator"></div>

  <!-- Phone screenshots -->
  <div class="screenshots">
    <div class="phone phone-1">
      <img src="./blending_screen.png" alt="">
    </div>
    <div class="phone phone-2">
      <img src="./main_screen.png" alt="">
    </div>
    <div class="phone phone-3">
      <img src="./blend_player_screen.png" alt="">
    </div>
  </div>

  <div class="vignette-right"></div>
</div>

<div class="hint">1024 × 500 px &nbsp;·&nbsp; Google Play feature graphic &nbsp;·&nbsp; screenshot at 1× zoom</div>

<script>
// Deterministic star field seeded to avoid re-randomising on reload
function lcg(seed) {
  return function() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; };
}
const rr = lcg(0xDEADBEEF);

const feature = document.getElementById('feature');

// Generate 90 stars
for (let i = 0; i < 90; i++) {
  const x = rr() * 100;
  const y = rr() * 100;
  const r = rr();
  const size = r < 0.65 ? 1 : r < 0.88 ? 1.5 : 2;
  const opacity = 0.08 + rr() * 0.55;
  // Fewer stars in left branding area
  if (x < 42 && opacity > 0.35) continue;
  const el = document.createElement('div');
  el.className = 'star';
  el.style.cssText = `left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;width:${size}px;height:${size}px;opacity:${opacity.toFixed(2)};`;
  feature.appendChild(el);
}
</script>
</body>
</html>
